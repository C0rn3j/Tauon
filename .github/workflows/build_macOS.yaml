name: Build macOS App

on:
  push:
    branches:
      - master
      - macos # debug - remove me
  pull_request:
    branches:
      - master
      - macos # debug - remove me

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          submodules: true

# Probably worthless since we're already doing init above but worht a try
      - name: Initialize Git submodules
        run: |
          git submodule update --init --recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.13

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build pyinstaller
          brew install gtk+3 pango cairo harfbuzz ffmpeg flac opusfile libogg libvorbis

      - name: Build the project using python-build
        run: |
          python -m build
#        env:
#          CFLAGS: "-I/usr/local/include"
#          LDFLAGS: "-L/usr/local/lib"

      - name: Build macOS app with PyInstaller
        run: |
          pyinstaller mac.spec

      - name: Create DMG
        run: |
          mkdir -p dist/dmg
          APP_NAME="TauonMusicBox"
          APP_PATH="dist/${APP_NAME}.app"
          DMG_PATH="dist/dmg/${APP_NAME}.dmg"

          # Create a .dmg package
          hdiutil create -volname "$APP_NAME" -srcfolder "$APP_PATH" -ov -format UDZO "$DMG_PATH"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: TauonMusicBox-dmg
          path: dist/dmg/TauonMusicBox.dmg
